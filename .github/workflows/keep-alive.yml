name: Keep Render backend awake

on:
  schedule:
    # A cada 10 minutos — bem abaixo do timeout de 15min do plano free do Render
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: curl -sf https://oped-fc.onrender.com/api/health || true
